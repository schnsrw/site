<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Brand tile -->
  <rect width="64" height="64" rx="14" fill="#217346"/>

  <!-- 3×3 grid of soft white cells, one bright center cell as the "active cell".
       Cells are separate (with tile-coloured gaps) so the icon reads as
       distinct cells, not a uniform grid. -->
  <g fill="#ffffff">
    <!-- top row -->
    <rect x="11" y="11" width="12" height="12" rx="2.5" fill-opacity="0.35"/>
    <rect x="26" y="11" width="12" height="12" rx="2.5" fill-opacity="0.35"/>
    <rect x="41" y="11" width="12" height="12" rx="2.5" fill-opacity="0.35"/>
    <!-- middle row -->
    <rect x="11" y="26" width="12" height="12" rx="2.5" fill-opacity="0.35"/>
    <rect x="26" y="26" width="12" height="12" rx="2.5"/>  <!-- ACTIVE CELL -->
    <rect x="41" y="26" width="12" height="12" rx="2.5" fill-opacity="0.35"/>
    <!-- bottom row -->
    <rect x="11" y="41" width="12" height="12" rx="2.5" fill-opacity="0.35"/>
    <rect x="26" y="41" width="12" height="12" rx="2.5" fill-opacity="0.35"/>
    <rect x="41" y="41" width="12" height="12" rx="2.5" fill-opacity="0.35"/>
  </g>
</svg>
